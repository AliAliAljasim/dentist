# Lab 5 Part 4 – Kubernetes Deployments
# Replace YOUR_DOCKERHUB_USERNAME with your Docker Hub username
# Apply: kubectl apply -f lab5deployment.yaml

# ─────────────────────────────────────────────
# FRONTEND DB
# ─────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frontenddb-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontenddb
spec:
  replicas: 1
  selector:
    matchLabels: {app: frontenddb}
  template:
    metadata:
      labels: {app: frontenddb}
    spec:
      containers:
        - name: frontenddb
          image: YOUR_DOCKERHUB_USERNAME/coe692:frontenddb
          ports: [{containerPort: 3306}]
          env:
            - {name: MYSQL_ROOT_PASSWORD, value: "student"}
          volumeMounts:
            - {mountPath: /var/lib/mysql, name: frontenddb-storage}
      volumes:
        - name: frontenddb-storage
          persistentVolumeClaim:
            claimName: frontenddb-pvc

---
# ─────────────────────────────────────────────
# FRONTEND SERVICE (Tomcat)
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 4
  selector:
    matchLabels: {app: frontend}
  template:
    metadata:
      labels: {app: frontend}
    spec:
      containers:
        - name: frontend
          image: YOUR_DOCKERHUB_USERNAME/coe692:frontend-v8
          ports: [{containerPort: 8080}]
          env:
            - {name: DB_URL,               value: "frontenddb:3306"}
            - {name: SEARCH_SERVICE,       value: "searchservice:8080"}
            - {name: APPOINTMENT_SERVICE,  value: "appointmentservice:8080"}
            - {name: JWT_SECRET,           value: "dental-system-secret-key-2026-coe692"}

